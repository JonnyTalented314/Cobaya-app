 
此生最好的运气        cǐ shēng zuì hǎo de yùn qi 
就是遇见了你          jiù shì yù jiàn le nǐ 
刚好你也爱我          gāng hǎo nǐ yě ài wǒ 
我也爱着你            wǒ yě ài zhe nǐ 
在这个尴尬年纪        zài zhè ge gān gà nián jì 
我不再是一个人        wǒ bú zài shì yí gè rén 
多幸运能和你在一起    duō xìng yùn néng hé nǐ zài yì qǐ 

此生最大的欢喜      cǐ shēng zuì dà de huān xǐ 
就是等到了你        jiù shì děng dào le nǐ 
是你带我走出        shì nǐ dài wǒ zǒu chū 
那片沼泽地          nà piàn zhǎo zé dì 
从我们交换信物      cóng wǒ men jiāo huàn xìn wù 
深情相望那刻起      shēn qíng xiāng wàng nà kè qǐ 
我的余生就是你      wǒ de yú shēng jiù shì nǐ 

我希望五十年以后      wǒ xī wàng wǔ shí nián yǐ hòu 
你还能在我左右        nǐ hái néng zài wǒ zuǒ yòu 
和你坐在摇椅里        hé nǐ zuò zài yáo yǐ lǐ 
感受那夕阳的温柔      gǎn shòu nà xī yáng de wēn róu 
听微风轻轻地吹        tīng wēi fēng qīng qīng dì chuī 
听河水慢慢地流        tīng hé shuǐ màn màn de liú 
再聊聊从前日子        zài liáo liáo cóng qián rì zi 
刚谈恋爱的时候        gāng tán liàn ài de shí hou 

我希望五十年以后  wǒ xī wàng wǔ shí nián yǐ hòu 
你还能在我左右    nǐ hái néng zài wǒ zuǒ yòu 
那时都已白了头    nà shí dōu yǐ bái le tóu 
还想听你叫我丫头  hái xiǎng tīng nǐ jiào wǒ yā tou 
轻轻牵着你的手    qīng qīng qiān zhe nǐ de shǒu 
静静靠在你胸口    jìng jìng kào zài nǐ xiōng kǒu 
这个画面是不是    zhè ge huà miàn shì bu shì 
就叫做长相厮守    jiù jiào zuò zhǎng xiàng sī shǒu 



